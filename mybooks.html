<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My books</title>
  <link rel="stylesheet" href="mybooks.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
      <div class="sidebar-toggle">&#10095;</div>

      <div class="sidebar-content">
          <h3>Menu</h3>
          <p>Options</p>
      <div class="sidebar-row">
        <h4>Section One</h4>
        <div class="sidebar-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
          fill="currentColor" viewBox="0 0 24 24" >
          <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
          <path d="M15 6v2h-2v2h2v4c0 2.21 1.79 4 4 4h2v-2h-2c-1.1 0-2-.9-2-2v-4h3V8h-3V6zm-5 12h2v-2h-2c-1.1 0-2-.9-2-2v-4h3V8H8V6H6v2H4v2h2v4c0 2.21 1.79 4 4 4"></path>
          </svg>
          <span>Font size</span>
          <input type="range" id="fontSlider" min="0" max="2" step="1" class="sidebar-slider">
      </div>

        <div class="sidebar-item">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
              fill="currentColor" viewBox="0 0 24 24" >
              <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
              <path d="M10.44 6.67C10.3 6.27 9.92 6 9.5 6h-1c-.43 0-.81.27-.94.67L3.64 18h2.12l1.04-3h4.42l1.04 3h2.12L10.46 6.67ZM7.48 13 9 8.61 10.52 13zM13 6h8v2h-8zm2 4h6v2h-6zm2 4h4v2h-4z"></path>
              </svg>
        <label for="fontFamilySelect">Font Family</label>
        <select id="fontFamilySelect">
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Calibri">Calibri</option>
        </select>
      </div>
      <div class="sidebar-item">
        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <path d="m16 22-4-4-4 4zm4-20h-5c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h5c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2m0 13h-5V4h5zM4 17h5c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2M4 4h5v11H4z"></path>
        </svg>
      <span>Word Spacing</span>
      <input type="range" id="wordSpacingSlider" min="0" max="10" step="1" class="sidebar-slider">
      </div>
        <div class="sidebar-item">
          <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
          fill="currentColor" viewBox="0 0 24 24" >
          <path d="M18 18H6v-3l-4 4 4 4v-3h12v3l4-4-4-4zM5.29 11h4.42l1.04 3h2.12L8.95 2.67c-.14-.4-.52-.67-.94-.67h-1c-.43 0-.81.27-.94.67L2.15 14h2.12l1.04-3ZM7.5 4.61 9.02 9H5.98zM13.25 2h-2.12l3.92 11.33c.14.4.52.67.94.67h1c.43 0 .81-.27.94-.67L21.85 2h-2.12l-3.25 9.39L13.23 2Z"></path>
          </svg>

          <span>Letter Spacing</span>
          <input type="range" id="letterSpacingSlider" min="0" max="5" step="1" class="sidebar-slider">
        </div>
      </div>
    <div class="sidebar-row">
        <h4>Section Two</h4>
        <div class="sidebar-item color-item">
          <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
          fill="currentColor" viewBox="0 0 24 24" >
          <path d="M21 5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v6H2v2h1v6c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-6h1v-2h-1zM5 5h14v6H5zm14 14h-2v-2h-2v2h-2v-2h-2v2H9v-2H7v2H5v-2h2v-2H5v-2h2v2h2v-2h2v2h2v-2h2v2h2v-2h2z"></path><path d="M9 15h2v2H9zm4 0h2v2h-2zm4 0h2v2h-2z"></path>
          </svg>
            <span class="color-label">Primary Color</span>

          <div class="color-swatches" data-target="--primary-color">
              <div class="swatch" data-color="#3498db"></div>
              <div class="swatch" data-color="#e74c3c"></div>
              <div class="swatch" data-color="#2ecc71"></div>
          </div>
      </div>

      <div class="sidebar-item color-item">
        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <path d="M21 5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v6H2v2h1v6c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-6h1v-2h-1zM5 9h2V7H5V5h2v2h2V5h2v2h2V5h2v2h2V5h2v2h-2v2h2v2h-2V9h-2v2h-2V9h-2v2H9V9H7v2H5zm14 10H5v-6h14z"></path><path d="M9 7h2v2H9zm4 0h2v2h-2z"></path>
        </svg>
          <span class="color-label">Secondary Color</span>

          <div class="color-swatches" data-target="--secondary-color">
              <div class="swatch" data-color="#A9A9A9"></div>
              <div class="swatch" data-color="#f1c40f"></div>
              <div class="swatch" data-color="#1abc9c"></div>
          </div>
      </div>
    </div>

    <div class="sidebar-row">
        <h4>Section Three</h4>
          <label class="sidebar-checkbox-row speak-toggle">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" >
            <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path d="M6 9h3v2H6zm5 0h7v2h-7zm4 4h3v2h-3zm-9 0h7v2H6z"></path><path d="M12 2C6.49 2 2 6.49 2 12c0 2.12.68 4.19 1.93 5.9l-1.75 2.53c-.21.31-.24.7-.06 1.03.17.33.51.54.89.54h9c5.51 0 10-4.49 10-10S17.51 2 12 2m0 18H4.91L6 18.43c.26-.37.23-.88-.06-1.22A7.98 7.98 0 0 1 4.01 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8Z"></path>
            </svg>
          <span>Text to Speech</span>
          <input type="checkbox" id="ttsToggle">
    </label>
    </div>

    <div class="sidebar-row">
        <h4>Section Four</h4>
      <label class="sidebar-checkbox-row">
        <img src="./images/dyslexia.png" class="sidebar-img">
            <span>Dyslexia</span>
            <input type="checkbox" id="dyslexiaToggle">
        </label>
    </div>
    <div class="sidebar-row">
        <h4>Section Five</h4>
        <div class="sidebar-item">
        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <path d="M4.5 11h5c.83 0 1.5-.67 1.5-1.5v-5c0-.83-.67-1.5-1.5-1.5h-5C3.67 3 3 3.67 3 4.5v5c0 .83.67 1.5 1.5 1.5M5 5h4v4H5zm14.5-2h-5c-.83 0-1.5.67-1.5 1.5v5c0 .83.67 1.5 1.5 1.5h5c.83 0 1.5-.67 1.5-1.5v-5c0-.83-.67-1.5-1.5-1.5M19 9h-4V5h4zM4.5 21h5c.83 0 1.5-.67 1.5-1.5v-5c0-.83-.67-1.5-1.5-1.5h-5c-.83 0-1.5.67-1.5 1.5v5c0 .83.67 1.5 1.5 1.5m.5-6h4v4H5zm14.5-2h-5c-.83 0-1.5.67-1.5 1.5v5c0 .83.67 1.5 1.5 1.5h5c.83 0 1.5-.67 1.5-1.5v-5c0-.83-.67-1.5-1.5-1.5m-.5 6h-4v-4h4z"></path>
        </svg>

          <span class="color-label">Grid Layout</span>

          <div class="grid-slider-container">
            <input type="range" id="gridSlider" min="1" max="5" value="5" class="sidebar-slider">
            <span id="gridValue">5</span>
          </div>
        </div>
    </div>
      </div>
  </div>


<header class="header">
    <a href="index.html" class="desktop-logo">
        <img src="icons/home.svg" alt="Home">
        <img src="images/icon0.png" class="home-btn-icon">
    </a>
    <button class="back-btn" onclick="history.back()">
        <img src="icons/arrow-left-stroke.svg" alt="Back">
    </button>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search books..." onkeypress="handleSearch(event)">
        <button id="searchBtn" onclick="startSearch()">
        <img src="icons/search.svg" alt="Search">
    </button>
      <img src="icons/spacebar.svg" class="search-icon">
    </div>
        <div class="header-actions">
          <button onclick="openPlanList()">Plan
          <img src="images/icon1.png" class="btn-icons">
          </button>
          <button onclick="openReadingList()">Reading
            <img src="images/icon2.png" class="btn-icons">
          </button>
          <button onclick="openFinishedList()">Finished
            <img src="images/icon3.png" class="btn-icons">
          </button>
        </div>
</header>

<div class="page-wrapper">

  <h2 id="listTitle"></h2>

  <div id="booksList" class="books-grid"></div>



<div id="finishPopup" class="finish-popup hidden">
  <div class="finish-popup-content">

    <div class="finish-profile">
      <img id="finishCover" src="" alt="Book cover">
    </div>

    <div class="finish-rating">
      <label>Rating</label>
      <select id="finishRating">
        <option value="">Select rating</option>
        <option value="1">⭐ 1</option>
        <option value="2">⭐⭐ 2</option>
        <option value="3">⭐⭐⭐ 3</option>
        <option value="4">⭐⭐⭐⭐ 4</option>
        <option value="5">⭐⭐⭐⭐⭐ 5</option>
      </select>

      <label>Review</label>
      <textarea id="finishReview" placeholder="Write your thoughts..."></textarea>

      <div class="finish-buttons">
        <button id="finishCancel" class="finish-btn cancel">Cancel</button>
        <button id="finishConfirm" class="finish-btn confirm">Confirm</button>
      </div>
    </div>

  </div>
</div>
</div>

<div id="settingsFooter" class="settings-footer">
  <button id="decreaseFontBtn" onclick="decreaseFont()">A-</button>
  <button id="increaseFontBtn" onclick="increaseFont()">A+</button>
  <div class="grid-slider-container">
    <label for="gridSlider">Grid Columns:</label>
    <input type="range" id="gridSlider" min="1" max="5" value="5">
    <span id="gridValue">5</span>
  </div>
    <button id="dyslexiaToggleBtn" class="dyslexia-btn">
    <img src="./images/dyslexia.png" alt="Toggle Dyslexia Mode">
  </button>  
  <!---
  <button id="darkModeToggleBtn" class="darkmode-btn">
    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
      fill="currentColor" viewBox="0 0 24 24" >
      <path d="M12.2 22c4.53 0 8.45-2.91 9.76-7.24a1.002 1.002 0 0 0-1.25-1.25c-.78.23-1.58.35-2.38.35-4.52 0-8.2-3.68-8.2-8.2 0-.8.12-1.6.35-2.38.11-.35.01-.74-.25-1s-.64-.36-1-.25A10.17 10.17 0 0 0 2 11.8C2 17.42 6.57 22 12.2 22M8.18 4.65c-.03.34-.05.68-.05 1.02 0 5.62 4.57 10.2 10.2 10.2.34 0 .68-.02 1.02-.05C17.93 18.38 15.23 20 12.2 20 7.68 20 4 16.32 4 11.8a8.15 8.15 0 0 1 4.18-7.15"></path>
    </svg>
  </button>
-->
  <button id="letterSpacingBtn" class="letterSpacing-btn">
      <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <path d="M18 18H6v-3l-4 4 4 4v-3h12v3l4-4-4-4zM5.29 11h4.42l1.04 3h2.12L8.95 2.67c-.14-.4-.52-.67-.94-.67h-1c-.43 0-.81.27-.94.67L2.15 14h2.12l1.04-3ZM7.5 4.61 9.02 9H5.98zM13.25 2h-2.12l3.92 11.33c.14.4.52.67.94.67h1c.43 0 .81-.27.94-.67L21.85 2h-2.12l-3.25 9.39L13.23 2Z"></path>
      </svg>
  </button>

      
</div>

<footer class="mobile-footer">
  <button onclick="goHome()">
    <img src="icons/home.svg" alt="">
    <span>Home</span>
  </button>

  <button onclick="openReadingList()">
    <img src="icons/book-open.svg" alt="">
    <span>Reading</span>
  </button>

  <button onclick="openPlanList()">
    <img src="icons/book-library.svg" alt="">
    <span>Plan</span>
  </button>

  <button onclick="openFinishedList()">
    <img src="icons/flag-chequered.svg" alt="">
    <span>Finished</span>
  </button>

  <button onclick="toggleTools()">
    <img src="icons/cog.svg" alt="setting">
    <span>Tools</span>
  </button>

</footer>

<script src="mybooks.js"></script>
<script src="feature.js"></script>
</body>
</html>
