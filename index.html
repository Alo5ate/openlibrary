<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Library Book Browser</title>
  <link rel="stylesheet" href="style.css">
</head>


<body>
    <header class="header">
         <a href="index.html" class="desktop-logo">
            <img src="icons/home.svg" alt="Home">
          <img src="images/icon0.png" class="home-btn-icon">
        </a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search books..." onkeypress="handleSearch(event)">
            <button id="searchBtn" onclick="startSearch()">
                <img src="icons/search.svg" alt="Search">
              </button>
              <img src="icons/spacebar.svg" class="search-icon">
        </div>
        <div class="header-actions">
          <button onclick="openPlanList()">Plan
          <img src="images/icon1.png" class="btn-icons">
          </button>
          <button onclick="openReadingList()">Reading
            <img src="images/icon2.png" class="btn-icons">
          </button>
          <button onclick="openFinishedList()">Finished
            <img src="images/icon3.png" class="btn-icons">
          </button>
        </div>
    </header>


<div class="page-wrapper">
    <section class="categories">
      <div class="sml">
        <h2>Categories</h2>
        <div class="category-scroll">
            <div class="category nav-item" data-category="fantasy">
            <img src="images/fantasy.jpg" alt="Fantasy">
            <p>Fantasy</p>
        </div>

    <div class="category nav-item" data-category="romance">
      <img src="images/romance.jpg" alt="Romance">
      <p>Romance</p>
    </div>

    <div class="category nav-item" data-category="science_fiction">
      <img src="images/scifi.jpg" alt="Sci‑Fi">
      <p>Sci‑Fi</p>
    </div>

    <div class="category nav-item" data-category="horror">
      <img src="images/horror.jpg" alt="Horror">
      <p>Sci‑Fi</p>
    </div>

  </div>
</div>

</section>

<div id="readingListSection" class="reading-list-wrapper">
  <h2 class="reading-list-title">Your Reading List</h2>
  <div id="readingListBooks" class="reading-list-books"></div>
  <div id="readingListEmpty" class="empty-message">
    Your reading list is empty
  </div>
</div>

</div>

</div>
<main id="results"></main>


<div id="settingsFooter" class="settings-footer">
  <button id="decreaseFontBtn" onclick="decreaseFont()">A-</button>
  <button id="increaseFontBtn" onclick="increaseFont()">A+</button>
  <button>Option 3</button>
</div>


<footer class="mobile-footer">
  <button onclick="goHome()">
    <img src="icons/home.svg" alt="">
    <span>Home</span>
  </button>

  <button onclick="openReadingList()">
    <img src="icons/book-open.svg" alt="">
    <span>Reading</span>
  </button>

  <button onclick="openPlanList()">
    <img src="icons/book-library.svg" alt="">
    <span>Plan</span>
  </button>

  <button onclick="openFinishedList()">
    <img src="icons/flag-chequered.svg" alt="">
    <span>Finished</span>
  </button>

  <button onclick="toggleTools()">
    <img src="icons/cog.svg" alt="setting">
    <span>Tools</span>
  </button>

</footer>

<script src="script.js"></script>
<script src="feature.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
